# JobShare — SSE realtime + Socket.IO + API + frontend SPA + blog OG preview
#
# Cách dùng:
#   sudo cp nginx-jobshare.conf /etc/nginx/sites-available/jobshare.conf
#   sudo ln -sf /etc/nginx/sites-available/jobshare.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# File này phải được `include` trong khối http {} (sites-enabled mặc định đã đúng).
# map $is_social_bot và các server {} cùng nằm trong http {}.

# --- Phát hiện crawler mạng xã hội (OG blog) ---
map $http_user_agent $is_social_bot {
    default 0;
    ~*facebookexternalhit 1;
    ~*Facebot               1;
    ~*Twitterbot           1;
    ~*LinkedInBot          1;
    ~*WhatsApp             1;
    ~*Slackbot             1;
    ~*TelegramBot          1;
    ~*Discordbot           1;
    ~*Pinterest            1;
    ~*Zalo                 1;
    ~*googlebot            1;
    ~*bingbot              1;
}

# --- HTTP → HTTPS (trang chính) ---
server {
    listen 80;
    server_name ws-jobshare.com www.ws-jobshare.com;
    return 301 https://$host$request_uri;
}

# --- HTTP → HTTPS (admin subdomain) ---
server {
    listen 80;
    server_name admin.ws-jobshare.com;
    return 301 https://$host$request_uri;
}

# --- HTTPS: trang chính + CTV + ứng viên ---
server {
    listen 443 ssl;
    server_name ws-jobshare.com www.ws-jobshare.com;

    client_max_body_size 60m;
    ssl_certificate /etc/letsencrypt/live/ws-jobshare.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ws-jobshare.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # [1] SSE — strip /api_jobshare → Node nhận /api/...
    location = /api_jobshare/api/admin/public-ctv-chat/inbox-stream {
        proxy_pass http://127.0.0.1:3000/api/admin/public-ctv-chat/inbox-stream;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding off;
    }
    location = /api_jobshare/api/admin/public-candidate-chat/inbox-stream {
        proxy_pass http://127.0.0.1:3000/api/admin/public-candidate-chat/inbox-stream;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding off;
    }
    location = /api_jobshare/api/public/ctv-chat/stream {
        proxy_pass http://127.0.0.1:3000/api/public/ctv-chat/stream;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding off;
    }
    location = /api_jobshare/api/public/candidate-chat/stream {
        proxy_pass http://127.0.0.1:3000/api/public/candidate-chat/stream;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding off;
    }
    location = /api_jobshare/api/ctv/notifications/stream {
        proxy_pass http://127.0.0.1:3000/api/ctv/notifications/stream;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding off;
    }
    location = /api_jobshare/api/admin/notifications/stream {
        proxy_pass http://127.0.0.1:3000/api/admin/notifications/stream;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # [2] Socket.IO (WebSocket)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # [3] API Node (KHÔNG set Connection upgrade)
    location /api_jobshare/ {
        client_max_body_size 60m;
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /api_ai/ {
        client_max_body_size 60m;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    root /home/ubuntu/JobShare_Web_True/frontend;
    index index.html;

    # [4] OG preview blog — crawler → backend /public/og/...
    #     Người dùng thường vẫn nhận SPA (try_files → index.html)
    location ~ ^/(vi|en|ja)(/candidate)?/blog/([^/]+)/?$ {
        error_page 418 = @blog_og_proxy;
        if ($is_social_bot) { return 418; }
        try_files $uri $uri/ /index.html;
    }

    location @blog_og_proxy {
        proxy_pass http://127.0.0.1:3000/public/og$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

