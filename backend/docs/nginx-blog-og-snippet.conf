# Snippet: OG preview thumbnail khi chia sẻ link blog
#
# 1) Thêm block `map` vào http {} (ngoài server {}, thường trong nginx.conf hoặc conf.d/maps.conf):
#
# map $http_user_agent $is_social_bot {
#     default 0;
#     ~*facebookexternalhit 1;
#     ~*Facebot 1;
#     ~*Twitterbot 1;
#     ~*LinkedInBot 1;
#     ~*WhatsApp 1;
#     ~*Slackbot 1;
#     ~*TelegramBot 1;
#     ~*Discordbot 1;
#     ~*Pinterest 1;
#     ~*Zalo 1;
# }
#
# 2) Merge các location sau vào server block HTTPS ws-jobshare.com
#    TRƯỚC `location / { try_files ... }`
#
# Yêu cầu backend: GET /public/og/:lang/blog/:slug
#                   GET /public/og/:lang/candidate/blog/:slug

location ~ ^/(vi|en|ja)(/candidate)?/blog/([^/]+)/?$ {
    error_page 418 = @blog_og_proxy;
    if ($is_social_bot) { return 418; }
    try_files $uri $uri/ /index.html;
}

location @blog_og_proxy {
    proxy_pass http://127.0.0.1:3000/public/og$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Sau khi sửa:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Kiểm tra (thay SLUG):
#   curl -A "facebookexternalhit/1.1" https://ws-jobshare.com/vi/blog/SLUG | grep og:image
